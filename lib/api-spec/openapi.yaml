openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: lyrics
    description: Visual-to-lyrics retrieval
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeVisual
      tags: [lyrics]
      summary: Match lyrics to a visual
      description: >-
        Embeds the visual (image, or the averaged frames of a video) with a
        single mood-agnostic query, retrieves the top lyric matches from the
        catalog, and returns them as `best` (pure visual-distance order) plus a
        dynamic bucket per mood found in the results (mood is stored in catalog
        metadata).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Matches grouped by mood
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        frames:
          type: array
          minItems: 1
          description: >-
            Ordered list of base64 JPEG data URLs. For an image this is a single
            frame; for a video, frames sampled at ~1fps. Their embeddings are
            averaged into one mood-agnostic query vector.
          items:
            type: string
      required:
        - frames
    LyricMatch:
      type: object
      properties:
        lyric:
          type: string
        artist:
          type: string
        track:
          type: string
        distance:
          type: number
      required:
        - lyric
        - artist
        - track
        - distance
    AnalyzeResponse:
      type: object
      description: >-
        Matches keyed by bucket. The `best` key always holds the absolute best
        matches ordered by pure visual distance. Every other key is a mood that
        was actually retrieved from the catalog (the mood taxonomy is dynamic, so
        the set of those keys varies per request).
      properties:
        best:
          type: array
          items:
            $ref: "#/components/schemas/LyricMatch"
      required:
        - best
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/LyricMatch"

